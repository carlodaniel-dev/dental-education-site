name: Deploy to GitHub Pages

on:
  push:
    # Asegúrate de poner el nombre de la rama que usas (ej. main o astro-migration)
    branches: [astro-migration] 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install, build, and upload with Astro
        uses: withastro/action@v3
        with:
          path: dental-education-astro # Ubicación de tu proyecto Astro

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4